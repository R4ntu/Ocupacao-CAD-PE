<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAD PE · Ocupação de Armazenagem — Shopee Fulfillment</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark"><i class="bi bi-buildings-fill"></i></span>
      <div class="brand-text">
        <strong>Ocupação de Armazenagem</strong>
        <span>CAD PE · BRFPE1 — Shopee Fulfillment</span>
      </div>
    </div>
    <div class="topbar-right">
      <div class="saturation-pill" id="saturationPill"><span class="dot"></span><span class="label">—</span></div>
      <span id="lastUpdate" class="muted">Carregando…</span>
      <button class="btn-icon" id="btnRefresh" title="Atualizar agora"><i class="bi bi-arrow-repeat"></i></button>
    </div>
  </header>

  <!-- FILTRO POR ZONA (topo) -->
  <div class="filterbar">
    <span class="filterbar-label"><i class="bi bi-funnel-fill"></i> Zona</span>
    <div class="zone-chips" id="zoneChips"></div>
  </div>

  <main class="content">

    <!-- KPIs -->
    <section class="kpi-grid" id="kpiGrid"></section>

    <!-- ZONAS NÃO-PICKING -->
    <section class="mb-section">
      <div class="section-title"><i class="bi bi-diagram-2-fill"></i> Zonas não-Picking</div>
      <div class="np-grid" id="nonPickingCards"></div>
    </section>

    <!-- HEATMAP -->
    <section class="card mb-section">
      <div class="card-head">
        <h3><i class="bi bi-grid-3x3-gap-fill"></i> Ocupação por Rua</h3>
        <div class="heat-scale" id="heatScale"></div>
      </div>
      <div class="heatmap-scroll"><div id="heatmap" class="heatmap"></div></div>
    </section>

    <!-- CARDS DE ZONA (PICKING) -->
    <section class="mb-section">
      <div class="section-title"><i class="bi bi-boxes"></i> Zonas de Picking</div>
      <div class="zone-grid" id="zoneCards"></div>
    </section>

    <!-- CAPACIDADE + DONUT -->
    <section class="grid-2 mb-section">
      <div class="card">
        <div class="card-head"><h3><i class="bi bi-battery-half"></i> Capacidade Disponível</h3></div>
        <div id="capacityPanel" class="capacity-panel"></div>
      </div>
      <div class="card">
        <div class="card-head"><h3><i class="bi bi-pie-chart-fill"></i> Distribuição por Zona</h3></div>
        <div id="distroDonut"></div>
      </div>
    </section>

    <!-- TOP TABLES -->
    <section class="grid-2 mb-section">
      <div class="card">
        <div class="card-head"><h3><i class="bi bi-exclamation-triangle-fill"></i> Top 10 Ruas Críticas</h3></div>
        <div class="table-wrap"><table class="data-table" id="topStreets"></table></div>
      </div>
      <div class="card">
        <div class="card-head"><h3><i class="bi bi-box-seam-fill"></i> Top 10 SKU — Maior Estoque</h3></div>
        <div class="table-wrap"><table class="data-table" id="topSkuQty"></table></div>
      </div>
    </section>

    <footer class="foot"><span>Dashboard de Ocupação · CAD PE (BRFPE1)</span><span id="footStatus"></span></footer>
  </main>

  <div id="loader" class="loader">
    <div class="loader-box">
      <span class="loader-mark"><i class="bi bi-buildings-fill"></i></span>
      <div class="spinner-border text-sh" role="status"></div>
      <p id="loaderMsg">Conectando ao Web App…</p>
    </div>
  </div>
  <div id="heatTooltip" class="heat-tooltip" hidden></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/apexcharts@3.49.1/dist/apexcharts.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
